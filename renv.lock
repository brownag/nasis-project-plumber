      "Authors@R": "c(person(given=\"Dylan\", family=\"Beaudette\", role = c(\"aut\", \"cre\"), email = \"dylan.beaudette@usda.gov\", comment = c(ORCID=\"0009-0008-2780-4785\")),  person(given=\"Pierre\", family=\"Roudier\", email=\"roudierp@landcareresearch.co.nz\", role = c(\"aut\", \"ctb\")),  person(given=\"Andrew\", family=\"Brown\", email=\"andrew.g.brown@usda.gov\", role = c(\"aut\", \"ctb\")),  person(given=\"Stephen\", family=\"Roecker\", role = c(\"aut\", \"ctb\")), person(given = \"David\", family = \"Rossiter\", role = c(\"ctb\")))",
      "Author": "Dylan Beaudette [aut, cre] (ORCID: <https://orcid.org/0009-0008-2780-4785>), Pierre Roudier [aut, ctb], Andrew Brown [aut, ctb], Stephen Roecker [aut, ctb], David Rossiter [ctb]",
